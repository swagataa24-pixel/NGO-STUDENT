<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="upayinfoPVT">
  <defs>
    <!-- Deep, rich background gradient -->
    <radialGradient id="bgGrad" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#184036" />
      <stop offset="60%" stop-color="#0c241e" />
      <stop offset="100%" stop-color="#05100d" />
    </radialGradient>

    <!-- Premium Golden Gradients for strokes and accents -->
    <linearGradient id="goldPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF2CD" />
      <stop offset="30%" stop-color="#F6D68A" />
      <stop offset="70%" stop-color="#C59B45" />
      <stop offset="100%" stop-color="#8C671D" />
    </linearGradient>

    <linearGradient id="goldSecondary" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F6D68A" />
      <stop offset="100%" stop-color="#9C7729" />
    </linearGradient>

    <!-- Glassmorphism fill for layered aesthetics -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.08)" />
      <stop offset="50%" stop-color="rgba(255, 255, 255, 0.03)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.0)" />
    </linearGradient>

    <!-- Drop shadow for depth -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.75" />
    </filter>

    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="0" dy="4"/>
      <feGaussianBlur stdDeviation="6" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.4" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>

    <!-- Ambient glow for center -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Subtle background pattern: Abstract geometric grid -->
    <pattern id="geoGrid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <path d="M 60,0 L 0,60 M 0,0 L 60,60" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1.5" />
      <circle cx="30" cy="30" r="1.5" fill="rgba(246, 214, 138, 0.15)" />
    </pattern>
  </defs>

  <!-- Base Icon Background -->
  <rect width="512" height="512" rx="116" fill="url(#bgGrad)" />
  
  <!-- Overlay Pattern -->
  <rect width="512" height="512" rx="116" fill="url(#geoGrid)" />

  <!-- Inner glass reflection/border for the main tile -->
  <rect width="506" height="506" x="3" y="3" rx="113" fill="none" stroke="url(#glass)" stroke-width="6" style="mix-blend-mode: overlay;" />

  <!-- Central Composition Group -->
  <g transform="translate(256, 256)">
    <!-- Deep ambient backlight -->
    <circle r="140" fill="#F6D68A" opacity="0.18" filter="url(#glow)" />

    <!-- Outer Decorative Orbits -->
    <circle r="185" fill="none" stroke="url(#goldPrimary)" stroke-width="2" opacity="0.4" stroke-dasharray="8 12" />
    <circle r="215" fill="none" stroke="url(#goldSecondary)" stroke-width="1.5" opacity="0.2" />

    <!-- Symmetrical Intersecting Loops (Infinity/Flower motif) -->
    <!-- Loop 1 (Top Left to Bottom Right) -->
    <path d="M 0,-110 C -150,-110 -180,110 0,110 C 150,110 180,-110 0,-110 Z" 
          fill="url(#glass)" 
          stroke="url(#goldPrimary)" 
          stroke-width="10" 
          filter="url(#shadow)" 
          transform="rotate(45)" />
          
    <!-- Loop 2 (Top Right to Bottom Left) -->
    <path d="M 0,-110 C 150,-110 180,110 0,110 C -150,110 -180,-110 0,-110 Z" 
          fill="url(#glass)" 
          stroke="url(#goldSecondary)" 
          stroke-width="10" 
          filter="url(#shadow)" 
          transform="rotate(-45)" />

    <!-- Central Plaque (Rotated Square / Diamond) -->
    <g filter="url(#shadow)">
      <rect x="-60" y="-60" width="120" height="120" rx="30" fill="url(#goldPrimary)" transform="rotate(45)" />
      <!-- Inner indented detail -->
      <rect x="-52" y="-52" width="104" height="104" rx="26" fill="none" stroke="#6b4c10" stroke-width="2" transform="rotate(45)" opacity="0.4" />
      
      <!-- Central Aesthetic Symbol (Sparkle / 4-point star) -->
      <path d="M 0,-36 C 4,-12 12,-4 36,0 C 12,4 4,12 0,36 C -4,12 -12,4 -36,0 C -12,-4 -4,-12 0,-36 Z" fill="#0c241e" filter="url(#innerShadow)" />
      
      <!-- Inner diamond -->
      <rect x="-10" y="-10" width="20" height="20" rx="4" fill="url(#goldPrimary)" transform="rotate(45)" />
    </g>
  </g>
</svg>
